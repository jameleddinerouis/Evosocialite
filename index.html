<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evosocialite - Accueil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            text-align: center;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .logo {
            max-width: 250px;
            margin-bottom: 20px;
        }
        h1 {
            font-weight: 900;
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            color: #aaaaaa;
            margin-bottom: 40px;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #ffffff;
        }
        .btn-primary:hover {
            background-color: #000000;
            color: #ffffff;
        }
        .btn-secondary {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #333333;
        }
        .btn-secondary:hover {
            border-color: #ffffff;
        }
        .reviews-section {
            margin-top: 80px;
            text-align: left;
        }
        .reviews-section h2 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }
        .reviews-grid::-webkit-scrollbar { width: 8px; }
        .reviews-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .review-card {
            background-color: #111111;
            padding: 20px;
            border: 1px solid #222222;
            border-radius: 6px;
        }
        .review-user {
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 5px;
        }
        .review-note {
            font-size: 0.8rem;
            color: #888888;
            margin-bottom: 10px;
        }
        .review-text {
            color: #cccccc;
            font-size: 0.95rem;
            line-height: 1.4;
        }
    </style>
</head>
