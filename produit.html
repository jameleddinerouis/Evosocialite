<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evosocialite - Achat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            text-align: center;
        }
        .header {
            padding: 30px;
            border-bottom: 1px solid #222222;
        }
        .btn-back {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            border: 1px solid #333333;
            padding: 8px 15px;
            border-radius: 4px;
        }
        .btn-back:hover { background-color: #ffffff; color: #000000; }
        
        .product-container {
            max-width: 600px;
            margin: 50px auto;
            background-color: #111111;
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 40px;
        }
        .product-logo {
            width: 120px;
            height: 120px;
            background-color: #222222;
            border-radius: 8px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-logo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        h1 { font-weight: 900; text-transform: uppercase; margin-bottom: 5px; }
        .duration { color: #888888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
        .price { font-size: 3rem; font-weight: 900; margin-bottom: 40px; border-bottom: 1px solid #333333; padding-bottom: 20px; }
        
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            border-radius: 4px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .btn-flouci { background-color: #ffffff; color: #000000; border: none; }
        .btn-flouci:hover { background-color: #cccccc; }
        .btn-social { background-color: transparent; border: 1px solid #ffffff; color: #ffffff; }
        .btn-social:hover { background-color: #222222; }
    </style>
</head>
<body>

<div class="header">
    <a href="offres.html" class="btn-back">Retour aux offres</a>
</div>

<div class="product-container">
    <div class="product-logo"><img id="prod-img" src="" alt="Logo"></div>
    <h1 id="prod-title">Chargement...</h1>
    <div class="duration" id="prod-duration">12 Mois</div>
    <div class="price" id="prod-price">... DT</div>
    
    <a href="TON_LIEN_FLOUCI" class="btn btn-flouci">Payer avec Flouci</a>
    <a href="LIEN_DISCORD" class="btn btn-social" target="_blank">Nous contacter sur Discord</a>
    <a href="LIEN_FACEBOOK" class="btn btn-social" target="_blank">Nous contacter sur Facebook</a>
</div>

<script>
    // Base de donnees des produits
    const infosProduits = {
        chatgpt: { nom: "ChatGPT Pro", duree: "Abonnement 12 Mois", prix: "49 DT", img: "logo_chatgpt.png" },
        gemini: { nom: "Gemini Pro", duree: "Abonnement 12 Mois", prix: "49 DT", img: "logo_gemini.png" },
        netflix: { nom: "Netflix Family", duree: "6 Comptes - 12 Mois", prix: "69 DT", img: "logo_netflix.png" },
        spotify: { nom: "Spotify Solo", duree: "Abonnement 12 Mois", prix: "39 DT", img: "logo_spotify.png" },
        perplex_pro: { nom: "Perplexity Pro", duree: "Abonnement 12 Mois", prix: "59 DT", img: "logo_perplexity.png" },
        perplex_max: { nom: "Perplexity Max", duree: "Abonnement 12 Mois", prix: "179 DT", img: "logo_perplexity.png" }
    };

    // Recuperation de l'identifiant dans l'URL (ex: ?id=chatgpt)
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');

    if (id && infosProduits[id]) {
        document.getElementById('prod-title').innerText = infosProduits[id].nom;
        document.getElementById('prod-duration').innerText = infosProduits[id].duree;
        document.getElementById('prod-price').innerText = infosProduits[id].prix;
        document.getElementById('prod-img').src = infosProduits[id].img;
    } else {
        document.getElementById('prod-title').innerText = "Produit introuvable";
        document.getElementById('prod-price').innerText = "0 DT";
    }
</script>

</body>
</html>
